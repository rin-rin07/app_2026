<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>DOM操作 練習用</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 600px;
        margin: 40px auto;
        padding: 0 20px;
      }
      button {
        padding: 8px 16px;
        font-size: 16px;
        cursor: pointer;
      }
      ul {
        margin-top: 16px;
      }
    </style>
  </head>
  <body>
    <h1>DOM操作 練習用ページ</h1>

    <p>
      「追加」ボタンを押すと、下のリストに新しい項目が追加されるようにしてみましょう。
    </p>

    <button id="add-item-btn">追加</button>

    <ul id="item-list">
      <li>サンプル1</li>
      <li>サンプル2</li>
    </ul>

    <script>
      // ↓↓↓ ここから下に、スライドのコードを書いてください ↓↓↓
      const todoForm = document.getElementById("todo-form");
      const todoInput = document.getElementById("todo-input");
      todoForm.addEventListener("submit", (event) => {
        event.preventDefault();          // ページリロードを防止
        const text = todoInput.value;    // 入力欄の値を取得
        console.log("入力された値:", text);
        todoInput.value = "";            // 入力欄をクリア
      });
    </script>
  </body>
</html>
